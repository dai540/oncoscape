project:
  name: oncoscape-v3
  mode: hest-compatible-breast-layer

paths:
  project_root: /project
  data_root: /project/data
  run_root: /project/run

external:
  hest_root: /project/external/HEST
  use_hest_layout: true
  use_scvi_tools: true
  use_cell2location: true
  use_openslide: true
  foundation_encoder: pathology_foundation_model

data:
  required_sources:
    - wu2021_visium
    - tenx_visium_ffpe
    - tenx_visium_ff
    - tenx_xenium_breast
    - gse176078
    - gse161529
  recommended_sources:
    - gse235326

targets:
  primary:
    - compartment
    - broad_tme
  secondary:
    - programs
    - uncertainty

tiling:
  tile_size_um: 112
  target_mpp: 0.5
  patch_size_px: 224

model:
  strategy: compartment_first_broad_tme_first
  encoder: pathology_foundation_model
  spatial_module: lightweight_spatial_transformer

evaluation:
  strict_holdout: true
  patient_holdout: true
  source_holdout: true
  metrics:
    compartment:
      - macro_f1
      - balanced_accuracy
    broad_tme:
      - pearson
      - spearman
      - js_divergence
    programs:
      - pearson
      - rmse

outputs:
  registry_dir: /project/run/data_interim
  reference_dir: /project/run/outputs/reference
  teacher_dir: /project/run/data_interim/labels
  tile_dir: /project/run/data_interim/tiles
  checkpoint_dir: /project/run/outputs/checkpoints
  prediction_dir: /project/run/outputs/predictions
  report_dir: /project/run/outputs/reports
