[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "oncoscape"
version = "0.1.0"
description = "HPC-first public-data pipeline for H&E-to-spatial-biology modeling"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "anndata>=0.12,<0.13",
  "h5py",
  "numpy<2",
  "pandas",
  "Pillow",
  "pyarrow",
  "PyYAML",
  "scipy",
  "torch",
  "zarr<3",
]

[project.optional-dependencies]
vision = ["torchvision", "timm", "openslide-python"]
spatial = ["scvi-tools", "cell2location"]
docs = ["sphinx>=8.0"]

[project.scripts]
oncoscape-fetch-public = "oncoscape.cli.fetch_public:main"
oncoscape-make-breast-manifest = "oncoscape.cli.make_public_breast_manifest:main"
oncoscape-register = "oncoscape.cli.register_data:main"
oncoscape-preflight = "oncoscape.cli.preflight:main"
oncoscape-build-reference = "oncoscape.cli.build_reference:main"
oncoscape-make-teachers = "oncoscape.cli.make_teachers:main"
oncoscape-extract-patches = "oncoscape.cli.extract_patches:main"
oncoscape-train-breast = "oncoscape.cli.train_breast:main"
oncoscape-eval-render = "oncoscape.cli.eval_render:main"
oncoscape-report = "oncoscape.cli.report:main"
oncoscape-run = "oncoscape.cli.run_pipeline:main"
oncoscape-select-seed = "oncoscape.cli.select_seed:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
